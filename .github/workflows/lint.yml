name: Lint add-on config

on:
  push:
    paths:
      - "questboard/**"
  pull_request:
    paths:
      - "questboard/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Lint add-on config
        uses: frenck/action-addon-linter@v2
        with:
          path: "./questboard"
